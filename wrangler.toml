name = "burakish-abaya"
type = "javascript"

[env.production]
name = "burakish-abaya-prod"
routes = [
  { pattern = "example.com/*", zone_name = "example.com" }
]

[build]
command = "echo 'No build required - static site'"
cwd = "./"
watch_paths = ["index.html", "css/**", "js/**", "assets/**"]

[build.upload]
format = "service-worker"
main = "./index.html"
